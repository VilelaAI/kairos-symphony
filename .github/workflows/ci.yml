name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Build primeiro: os pacotes resolvem @kairos-symphony/* via dist/ (workspace
      # symlink + package.json types), então typecheck e testes precisam do build.
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test --coverage
      - run: pnpm test:conformance
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: coverage/
